listen = "[::]:53"
special_suffixes = [".h", ".local", ".lan", ".home", ]

# openwrt dnsmasq 地址
special_upstream = "127.0.0.1:5353"

# 国内dns地址
domestic_upstream = "223.5.5.5"

# 是否信任国内上游返回的 NODATA（NOERROR 且无对应记录）为真实结果，
# 不再转查国外。默认 false。
trust_domestic_nodata_reply = false

# 国际dns地址
foreign_upstream = "8.8.8.8"

# 也可使用xray-core任意门转发到dns服务器
# foreign_upstream = "127.0.0.1:5354"

# 广告列表: 推荐：https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdomainlite.txt
adblock_path = "/etc/tsubamegaeshi-rs/adblockdomainlite.txt"
adblock_fp_rate = 0.001

cache_size = 300
query_timeout_sec = 3
log_level = "debug"
enable_ipv6_aaaa = false
gfwlist_path = "/etc/tsubamegaeshi-rs/gfwlist.txt"
mmdb_path = "/etc/tsubamegaeshi-rs/Country-only-cn-private.mmdb"
gfbloom_fp_rate = 0.001

# 污染 IPv4 地址列表文件路径
ipv4_list = "/etc/tsubamegaeshi-rs/ipv4.txt"

# 污染 IPv6 地址列表文件路径
ipv6_list = "/etc/tsubamegaeshi-rs/ipv6.txt"

# 国外 DNS 查询时最多丢弃多少个污染包后才放弃，默认 5
# 0 表示放弃污染检查
max_polluted_packets = 5

force_foreign_domains = [
  "syncthing.net",
]

force_domestic_domains = [
  "miui.com",
]

# 静态 hosts 记录 (用于关键域名兜底，避免 Xray 未启动时无法解析)
[hosts.ipv4]
"ip.3322.net" = "118.184.169.32"

[hosts.ipv6]
"google.com" = "2607:f8b0:400a:809::200e"

